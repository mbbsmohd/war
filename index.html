<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>⚔️ WARZONE 3D ULTIMATE - 9000+ Features</title>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            overflow: hidden;
            background: #0a0a0a;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            cursor: crosshair;
        }
        canvas {
            display: block;
        }

        /* ===== HUD OVERLAY ===== */
        #hud {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        #hud>* {
            pointer-events: auto;
        }

        /* ---- TOP BAR ---- */
        #topBar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid rgba(255, 200, 50, 0.25);
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            text-shadow: 0 0 12px rgba(0, 0, 0, 0.8);
            flex-wrap: wrap;
            gap: 6px;
        }
        #topBar .stat {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 3px 12px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        #topBar .stat .icon {
            font-size: 16px;
        }
        #topBar .stat .value {
            color: #ffd866;
            font-size: 16px;
            min-width: 24px;
            text-align: center;
        }
        #topBar .stat .label {
            color: #aaa;
            font-size: 11px;
            text-transform: uppercase;
        }
        #topBar .stat.health .value {
            color: #ff4757;
        }
        #topBar .stat.ammo .value {
            color: #70a1ff;
        }
        #topBar .stat.score .value {
            color: #ffd866;
        }
        #topBar .stat.wave .value {
            color: #7bed9f;
        }
        #topBar .stat.kills .value {
            color: #ff6b81;
        }
        #topBar .stat.weapon .value {
            color: #ff9f43;
            font-size: 13px;
        }

        /* ---- CROSSHAIR ---- */
        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 11;
            pointer-events: none;
            opacity: 0.9;
            transition: all 0.15s;
        }
        #crosshair .dot {
            width: 5px;
            height: 5px;
            background: #ff2d55;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 16px rgba(255, 45, 85, 0.8), 0 0 40px rgba(255, 45, 85, 0.2);
        }
        #crosshair .ring {
            width: 36px;
            height: 36px;
            border: 2px solid rgba(255, 255, 255, 0.25);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.15s;
        }
        #crosshair .ring .line {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            width: 2px;
            height: 8px;
            left: 50%;
            top: -1px;
            transform: translateX(-50%);
        }
        #crosshair .ring .line:nth-child(2) {
            transform: translateX(-50%) rotate(90deg);
            top: 50%;
            left: -1px;
            width: 8px;
            height: 2px;
        }
        #crosshair .ring .line:nth-child(3) {
            transform: translateX(-50%) rotate(180deg);
            top: auto;
            bottom: -1px;
        }
        #crosshair .ring .line:nth-child(4) {
            transform: translateX(-50%) rotate(270deg);
            top: 50%;
            left: auto;
            right: -1px;
            width: 8px;
            height: 2px;
        }
        #crosshair.spread {
            transform: translate(-50%, -50%) scale(1.3);
        }
        #crosshair.spread .ring {
            border-color: rgba(255, 200, 50, 0.4);
        }

        /* ---- BOTTOM HUD ---- */
        #bottomHud {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 12;
            display: flex;
            gap: 10px;
            align-items: center;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            pointer-events: auto;
            flex-wrap: wrap;
            justify-content: center;
        }
        #bottomHud .btn {
            padding: 6px 16px;
            border: none;
            border-radius: 24px;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        #bottomHud .btn:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.18);
        }
        #bottomHud .btn.primary {
            background: #e74c3c;
            border-color: #e74c3c;
            color: #fff;
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.25);
        }
        #bottomHud .btn.primary:hover {
            background: #ff6b5a;
            box-shadow: 0 0 40px rgba(231, 76, 60, 0.4);
        }
        #bottomHud .btn.secondary {
            background: #2d3436;
            border-color: #636e72;
        }
        #bottomHud .btn.secondary:hover {
            background: #636e72;
        }
        #bottomHud .btn.weapon-btn {
            background: rgba(255, 200, 50, 0.12);
            border-color: rgba(255, 200, 50, 0.2);
            font-size: 11px;
            padding: 4px 12px;
        }
        #bottomHud .btn.weapon-btn.active {
            background: rgba(255, 200, 50, 0.25);
            border-color: #ffd866;
            box-shadow: 0 0 20px rgba(255, 200, 50, 0.15);
        }
        #bottomHud .btn.weapon-btn .key {
            color: #888;
            font-size: 9px;
            margin-right: 4px;
        }
        #bottomHud .key-hint {
            color: #888;
            font-size: 10px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        #bottomHud .key-hint kbd {
            background: rgba(255, 255, 255, 0.08);
            padding: 1px 8px;
            border-radius: 3px;
            font-size: 10px;
            color: #ddd;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        /* ---- MINIMAP ---- */
        #minimap {
            position: fixed;
            bottom: 80px;
            right: 16px;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.12);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 13;
            overflow: hidden;
            pointer-events: none;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
        }
        #minimap canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        /* ---- DAMAGE OVERLAY ---- */
        #damageOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 60%, rgba(255, 0, 0, 0));
            transition: background 0.08s;
        }
        #damageOverlay.hit {
            background: radial-gradient(ellipse at center, transparent 50%, rgba(255, 0, 0, 0.3));
        }
        #damageOverlay.low {
            background: radial-gradient(ellipse at center, transparent 55%, rgba(255, 0, 0, 0.15));
        }

        /* ---- GAME OVER ---- */
        #gameOverScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 50;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(14px);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            pointer-events: auto;
        }
        #gameOverScreen.show {
            display: flex;
        }
        #gameOverScreen .box {
            text-align: center;
            padding: 40px 50px;
            background: rgba(15, 15, 25, 0.95);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 100px rgba(0, 0, 0, 0.8);
            max-width: 480px;
        }
        #gameOverScreen h1 {
            font-size: 44px;
            color: #ff4757;
            text-shadow: 0 0 40px rgba(255, 45, 85, 0.3);
            margin-bottom: 4px;
            letter-spacing: 2px;
        }
        #gameOverScreen .sub {
            color: #aaa;
            font-size: 16px;
            margin-bottom: 20px;
        }
        #gameOverScreen .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 16px 0 24px;
            text-align: left;
        }
        #gameOverScreen .stats-grid .item {
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        #gameOverScreen .stats-grid .item .lbl {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
        }
        #gameOverScreen .stats-grid .item .val {
            font-size: 20px;
            color: #ffd866;
            font-weight: 700;
        }
        #gameOverScreen .btn-restart {
            padding: 12px 44px;
            border: none;
            border-radius: 40px;
            background: #e74c3c;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 40px rgba(231, 76, 60, 0.25);
        }
        #gameOverScreen .btn-restart:hover {
            transform: scale(1.06);
            box-shadow: 0 0 60px rgba(231, 76, 60, 0.4);
        }

        /* ---- MESSAGE FEED ---- */
        #messageFeed {
            position: fixed;
            top: 72px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            max-height: 50vh;
            overflow: hidden;
        }
        #messageFeed .msg {
            padding: 6px 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            animation: msgIn 0.3s ease-out, msgOut 0.4s 2.8s ease-in forwards;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }
        #messageFeed .msg.kill {
            border-color: rgba(255, 45, 85, 0.2);
            color: #ff6b81;
        }
        #messageFeed .msg.wave {
            border-color: rgba(123, 237, 159, 0.2);
            color: #7bed9f;
            font-size: 16px;
            padding: 10px 28px;
        }
        #messageFeed .msg.pickup {
            border-color: rgba(255, 200, 50, 0.2);
            color: #ffd866;
        }
        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(-16px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        @keyframes msgOut {
            from {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            to {
                opacity: 0;
                transform: translateY(-24px) scale(0.95);
            }
        }

        /* ---- CONTROLS HELP ---- */
        #controlsHelp {
            position: fixed;
            bottom: 80px;
            left: 16px;
            z-index: 12;
            color: rgba(255, 255, 255, 0.25);
            font-size: 11px;
            line-height: 1.6;
            pointer-events: none;
            font-weight: 300;
            letter-spacing: 0.2px;
        }
        #controlsHelp kbd {
            background: rgba(255, 255, 255, 0.05);
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        /* ---- WEAPON SELECTOR ---- */
        #weaponSelector {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 14;
            display: flex;
            gap: 6px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            pointer-events: auto;
        }
        #weaponSelector .ws-btn {
            padding: 4px 12px;
            border: none;
            border-radius: 12px;
            background: transparent;
            color: #888;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        #weaponSelector .ws-btn:hover {
            background: rgba(255, 255, 255, 0.06);
        }
        #weaponSelector .ws-btn.active {
            color: #fff;
            background: rgba(255, 200, 50, 0.15);
            border-color: rgba(255, 200, 50, 0.2);
            box-shadow: 0 0 20px rgba(255, 200, 50, 0.05);
        }
        #weaponSelector .ws-btn .key {
            color: #666;
            font-size: 9px;
            margin-right: 4px;
        }

        /* ---- PICKUP NOTIFICATION ---- */
        #pickupNotify {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            z-index: 16;
            pointer-events: none;
            opacity: 0;
            transition: all 0.3s ease;
            font-size: 28px;
            font-weight: 800;
            color: #ffd866;
            text-shadow: 0 0 40px rgba(255, 200, 50, 0.3);
        }
        #pickupNotify.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        /* ---- RESPONSIVE ---- */
        @media (max-width: 768px) {
            #topBar {
                font-size: 11px;
                padding: 6px 10px;
                gap: 4px;
            }
            #topBar .stat {
                padding: 2px 8px;
                gap: 4px;
            }
            #topBar .stat .value {
                font-size: 13px;
                min-width: 18px;
            }
            #topBar .stat .label {
                font-size: 8px;
            }
            #bottomHud {
                padding: 6px 12px;
                gap: 6px;
                bottom: 10px;
                border-radius: 24px;
            }
            #bottomHud .btn {
                font-size: 10px;
                padding: 4px 10px;
            }
            #bottomHud .key-hint {
                font-size: 8px;
            }
            #minimap {
                width: 90px;
                height: 90px;
                bottom: 70px;
                right: 10px;
            }
            #controlsHelp {
                display: none;
            }
            #weaponSelector {
                bottom: 70px;
                padding: 4px 10px;
                gap: 4px;
            }
            #weaponSelector .ws-btn {
                font-size: 9px;
                padding: 3px 8px;
            }
            #gameOverScreen .box {
                padding: 24px 16px;
                margin: 16px;
            }
            #gameOverScreen h1 {
                font-size: 28px;
            }
            #crosshair .ring {
                width: 28px;
                height: 28px;
            }
            #pickupNotify {
                font-size: 20px;
            }
        }
        @media (max-width: 480px) {
            #topBar .stat .label {
                display: none;
            }
            #topBar .stat {
                padding: 2px 6px;
            }
            #bottomHud .key-hint {
                display: none;
            }
            #minimap {
                width: 60px;
                height: 60px;
                bottom: 60px;
                right: 6px;
            }
            #weaponSelector {
                bottom: 60px;
            }
            #weaponSelector .ws-btn .key {
                display: none;
            }
        }
    </style>
</head>
<body>

    <!-- ===== HUD ===== -->
    <div id="hud">
        <div id="topBar">
            <div class="stat health">
                <span class="icon">❤️</span>
                <span class="label">HP</span>
                <span class="value" id="hpDisplay">100</span>
            </div>
            <div class="stat ammo">
                <span class="icon">🔫</span>
                <span class="label">AMMO</span>
                <span class="value" id="ammoDisplay">30/30</span>
            </div>
            <div class="stat score">
                <span class="icon">⭐</span>
                <span class="label">SCORE</span>
                <span class="value" id="scoreDisplay">0</span>
            </div>
            <div class="stat kills">
                <span class="icon">💀</span>
                <span class="label">KILLS</span>
                <span class="value" id="killsDisplay">0</span>
            </div>
            <div class="stat wave">
                <span class="icon">🌊</span>
                <span class="label">WAVE</span>
                <span class="value" id="waveDisplay">1</span>
            </div>
            <div class="stat">
                <span class="icon">👥</span>
                <span class="label">ENEMIES</span>
                <span class="value" id="enemyCountDisplay">0</span>
            </div>
            <div class="stat weapon">
                <span class="icon">🔧</span>
                <span class="label">WEAPON</span>
                <span class="value" id="weaponDisplay">Pistol</span>
            </div>
        </div>
    </div>

    <!-- Crosshair -->
    <div id="crosshair">
        <div class="ring">
            <div class="line"></div><div class="line"></div>
            <div class="line"></div><div class="line"></div>
        </div>
        <div class="dot"></div>
    </div>

    <!-- Damage Overlay -->
    <div id="damageOverlay"></div>

    <!-- Message Feed -->
    <div id="messageFeed"></div>

    <!-- Pickup Notification -->
    <div id="pickupNotify">⭐ +50</div>

    <!-- Minimap -->
    <div id="minimap"><canvas id="minimapCanvas"></canvas></div>

    <!-- Controls Help -->
    <div id="controlsHelp">
        <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> Move &nbsp;·&nbsp;
        <kbd>🖱</kbd> Aim/Shoot &nbsp;·&nbsp;
        <kbd>R</kbd> Reload &nbsp;·&nbsp;
        <kbd>1-4</kbd> Weapons &nbsp;·&nbsp;
        <kbd>G</kbd> Grenade &nbsp;·&nbsp;
        <kbd>Space</kbd> Pause
    </div>

    <!-- Weapon Selector -->
    <div id="weaponSelector">
        <button class="ws-btn active" data-weapon="0"><span class="key">1</span>🔫 Pistol</button>
        <button class="ws-btn" data-weapon="1"><span class="key">2</span>🔫 Rifle</button>
        <button class="ws-btn" data-weapon="2"><span class="key">3</span>💥 Shotgun</button>
        <button class="ws-btn" data-weapon="3"><span class="key">4</span>🚀 Rocket</button>
    </div>

    <!-- Bottom HUD -->
    <div id="bottomHud">
        <span class="key-hint"><kbd>R</kbd> Reload</span>
        <button class="btn primary" id="btnShoot">🔥 FIRE</button>
        <button class="btn secondary" id="btnPause">⏸ PAUSE</button>
        <button class="btn secondary" id="btnGrenade">💣 GRENADE</button>
        <span class="key-hint"><kbd>G</kbd> Grenade</span>
    </div>

    <!-- Game Over -->
    <div id="gameOverScreen">
        <div class="box">
            <h1>💀 GAME OVER</h1>
            <div class="sub">The battlefield claims another warrior.</div>
            <div class="stats-grid">
                <div class="item"><div class="lbl">Score</div><div class="val" id="finalScore">0</div></div>
                <div class="item"><div class="lbl">Kills</div><div class="val" id="finalKills">0</div></div>
                <div class="item"><div class="lbl">Wave</div><div class="val" id="finalWave">1</div></div>
                <div class="item"><div class="lbl">Accuracy</div><div class="val" id="finalAccuracy">0%</div></div>
                <div class="item"><div class="lbl">Shots</div><div class="val" id="finalShots">0</div></div>
                <div class="item"><div class="lbl">Grenades</div><div class="val" id="finalGrenades">0</div></div>
            </div>
            <button class="btn-restart" id="btnRestart">🔄 RESTART</button>
        </div>
    </div>

    <!-- ===== THREE.JS ===== -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ============================================================
        //  STATE
        // ============================================================
        const state = {
            score: 0,
            kills: 0,

            // Weapon definitions
            weapons: [{
                name: 'Pistol',
                ammo: 30,
                maxAmmo: 30,
                damage: 20,
                fireRate: 0.25,
                spread: 0.02,
                bulletsPerShot: 1,
                reloadTime: 1.2,
                icon: '🔫'
            }, {
                name: 'Rifle',
                ammo: 60,
                maxAmmo: 60,
                damage: 15,
                fireRate: 0.1,
                spread: 0.04,
                bulletsPerShot: 1,
                reloadTime: 1.8,
                icon: '🔫'
            }, {
                name: 'Shotgun',
                ammo: 20,
                maxAmmo: 20,
                damage: 10,
                fireRate: 0.6,
                spread: 0.15,
                bulletsPerShot: 6,
                reloadTime: 2.0,
                icon: '💥'
            }, {
                name: 'Rocket',
                ammo: 12,
                maxAmmo: 12,
                damage: 50,

            leaf1.position.y = 1.4 * scale;

        // ---- Enemy Factory ----
        const enemyColors = [0x8a2a2a, 0x6a2a4a, 0x4a2a6a, 0x2a4a6a, 0x6a4a2a];
        let enemyIdCounter = 0;

        function createEnemyModel(color) {
